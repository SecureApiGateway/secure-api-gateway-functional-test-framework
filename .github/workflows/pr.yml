name: PR - Build and Deploy
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
jobs:
  run_pr-template:
    name: PR - Build and Deploy
    # Testing openig-9745 branch
    uses: SecureApiGateway/secure-api-gateway-ci/.github/workflows/reusable-pr.yml@openig-9745
    secrets: inherit
    with:
      componentName: secure-api-gateway-functional-test-framework
      dockerTag: pr-${{ github.event.number }}